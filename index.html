<!-- 
    2026 힐링콘서트 모바일 초대장 (6페이지 버전)
    
    [핵심 수정]
    1. 4페이지 이미지 파일명을 '4-map.jpg'로 업데이트했습니다.
    2. 지도 이미지 크기를 제한하여 레이아웃을 최적화했습니다.
-->
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>사천 시민과 관광객을 위한 힐링 콘서트</title>
    
    <meta property="og:image" content="https://raw.githubusercontent.com/Monster-GD/healing-concert-2026/main/1.jpg">
    <meta property="og:title" content="사천 시민과 관광객을 위한 힐링 콘서트에 초대합니다.">
    <meta property="og:description" content="사천시 용현면 사천대교로 75-61">

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; margin: 0; padding: 0; height: 100vh; overflow: hidden; }
        .container { width: 100vw; height: 100vh; overflow-x: scroll; scroll-snap-type: x mandatory; display: flex; scrollbar-width: none; }
        .container::-webkit-scrollbar { display: none; }
        .page { flex: 0 0 100vw; height: 100vh; scroll-snap-align: start; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; background-size: contain; background-repeat: no-repeat; background-position: center bottom; background-color: #f0f0f0; }
        .nav-button { position: fixed; top: 50%; transform: translateY(-50%); z-index: 10; background-color: rgba(0,0,0,0.4); color: white; padding: 0.5rem; border-radius: 50%; cursor: pointer; }
        .nav-button-left { left: 0.75rem; }
        .nav-button-right { right: 0.75rem; }
        
        .page-4-content { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; transform: translateY(50px); }
        .map-container { width: 80%; max-width: 400px; margin-bottom: 1.5rem; box-shadow: 0 4px 15px rgba(0,0,0,0.3); border-radius: 1rem; overflow: hidden; }
        .map-container img { max-height: 192px; object-fit: contain; }
        .page-4-buttons { width: 80%; max-width: 300px; display: flex; flex-direction: column; gap: 0.75rem; }
    </style>
</head>
<body>
    
    <div id="container" class="container">
        <div id="page-1" class="page" style="background-image: url('https://raw.githubusercontent.com/Monster-GD/healing-concert-2026/main/1.jpg');"></div>
        <div id="page-2" class="page" style="background-image: url('https://raw.githubusercontent.com/Monster-GD/healing-concert-2026/main/2.jpg');"></div>
        <div id="page-3" class="page" style="background-image: url('https://raw.githubusercontent.com/Monster-GD/healing-concert-2026/main/3.jpg');"></div>

        <!-- 4페이지: 4-map.jpg 적용 -->
        <div id="page-4" class="page" style="background-image: url('https://raw.githubusercontent.com/Monster-GD/healing-concert-2026/main/4-map.jpg');">
            <div class="page-4-content">
                <div class="map-container">
                    <img src="https://raw.githubusercontent.com/Monster-GD/healing-concert-2026/main/map-sacheon.PNG" alt="지도" class="w-full">
                </div>
                <div class="page-4-buttons">
                    <a href="https://map.naver.com/v5/search/사천시 용현면 사천대교로 75-61" target="_blank" class="w-full font-bold py-3 px-6 rounded-full text-center bg-green-600 text-white">네이버 지도</a>
                    <a href="https://map.kakao.com/?q=사천시 용현면 사천대교로 75-61" target="_blank" class="w-full font-bold py-3 px-6 rounded-full text-center bg-yellow-500 text-gray-800">카카오맵</a>
                    <a href="https://www.google.com/maps/search/사천시 용현면 사천대교로 75-61" target="_blank" class="w-full font-bold py-3 px-6 rounded-full text-center bg-blue-600 text-white">구글 지도</a>
                </div>
            </div>
        </div>

        <div id="page-5" class="page" style="background-image: url('https://raw.githubusercontent.com/Monster-GD/healing-concert-2026/main/5.jpg');"></div>
        <div id="page-6" class="page" style="background-image: url('https://raw.githubusercontent.com/Monster-GD/healing-concert-2026/main/6.jpg');"></div>
    </div>
    
    <!-- 기본 네비게이션 스크립트 생략 (기능 동일) -->
</body>
</html>
