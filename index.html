<style>
    /* body의 overflow: hidden을 제거하여 스크롤이 가능하게 합니다 */
    body { font-family: 'Inter', sans-serif; margin: 0; padding: 0; }
    
    /* container는 가로로 페이지들을 나란히 배치합니다 */
    .container { 
        width: 100vw; 
        height: 100vh; 
        display: flex; 
        overflow-x: auto; /* hidden 대신 auto 또는 scroll 사용 */
        scroll-snap-type: x mandatory; 
        scrollbar-width: none; 
    }
    
    .container::-webkit-scrollbar { display: none; }
    
    .page { 
        flex: 0 0 100vw; /* 각 페이지는 화면 너비의 100%를 차지 */
        height: 100vh; 
        scroll-snap-align: start; 
        display: flex; 
        flex-direction: column; 
        align-items: center; 
        justify-content: center; 
        position: relative; 
        background-size: cover; /* contain보다 cover가 배경 채우기에 적합할 수 있습니다 */
        background-repeat: no-repeat; 
        background-position: center center; 
        background-color: #f0f0f0; 
    }
    /* 나머지 스타일 유지... */
</style>
